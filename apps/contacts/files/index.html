        const contactList = document.getElementById("contact-list");
        const contactDetails = document.getElementById("contact-details");
        const searchInput = document.getElementById("search");
        const sidebar = document.querySelector(".sidebar");
        const detailsView = document.querySelector(".details-view");

        function renderContacts(filter = "") {
            contactList.innerHTML = "";
            contacts
                .filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))
                .forEach((contact, index) => {
                    const li = document.createElement("li");
                    li.textContent = contact.name;
                    li.onclick = () => showContactDetails(index);
                    contactList.appendChild(li);
                });
        }

        const fieldOptions = [
            "Website", "Email", "Phone", "Address",
            "Home Phone", "Cell Phone",
        ];

        function newContactClicked() {
            contactDetails.innerHTML = `
            <h2>New Contact</h2>
            <label for="name">Name:</label><input type="text" id="nc-name" required />
            <label for="name">FedIY User:</label><input type="text" id="nc-fiy-user" />
            <fieldset>
                <legend>Fields</legend>
                <span id="fields"></span>

                <button>Add field</button>
            </fieldset>
            `;

        }
        function newContactFinalize() {

        }


        function showContactDetails(index) {
            function fieldToString([name, value]) {
                let ret = `<p><strong>${name}:</strong> `;
                if (name.endsWith('Email')) {
                    ret += `<a href="mailto:${value}">${value}</a>`;
                } else if (name.endsWith('Phone')) {
                    ret += `<a href="tel:${value}">${value}</a>`;
                } else if (name.endsWith('Website')) {
                    ret += `<a href="${value}" target="_blank">${value}</a>`;
                } else {
                    ret += value;
                }
                ret += '</p>';
                return ret;
            }

            const contact = contacts[index];
            contactDetails.innerHTML = `
<h2>${contact.name}</h2>
<h3>${contact.user}</h3>
${contact.fields.map(fieldToString).join('')}
<hr>
<button title="Download"><i class="fa fa-download"></i></button>
<button title="Share"><i class="fa fa-share"></i></button>
<button title="Edit"><i class="fa fa-pencil"></i></button>
<button title="Delete"><i class="fa fa-trash"></i></button>`;

            // Mobile behavior
            if (window.innerWidth <= 768) {
                sidebar.classList.add("hidden");
                detailsView.classList.add("active");
            }
        }

        // Mobile behavior
        function goBack() {
            sidebar.classList.remove("hidden");
            detailsView.classList.remove("active");
        }

        searchInput.addEventListener("input", () => {
            renderContacts(searchInput.value);
        });

        // Initial render
        renderContacts(new URL(document.location.toString()).searchParams.get('q') || "");
