<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contacts Page</title>

    <link rel="stylesheet" href="{{fediy_contacts_base_uri}}/main.css" />

    <!-- TODO locally host this instead -->
    <link rel="stylesheet" href="{{fediy_contacts_base_uri}}/fa/fa.css" />
    <link rel="icon" href="{{fediy_contacts_base_uri}}/favicon.ico" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <a class="nav-icon" href="//{{fediy_contacts_domain}}/portal" title="Apps"><i class="fa fa-th"></i></a>
        <a class="nav-icon" href="javascript:newContact()" title="Add Contact"><i class="fa fa-plus"></i></a>
        <a class="nav-icon" href="javascript:showContactDetails(profileIndex)" title="Profile"><i class="fa fa-user"></i></a>
        <a class="nav-icon" href="javascript:uploadContact()" title="Upload"><i class="fa fa-upload"></i></a>
        <a class="nav-icon" href="{{fediy_contacts_base_uri}}/all" title="Download"><i class="fa fa-download"></i></a>
<!--        <a class="nav-icon" title="Notifications"><i class="fa fa-bell"></i></a>-->
<!--        <a class="nav-icon" title="Settings"><i class="fa fa-cog"></i></a>-->
    </nav>
    <div class="container">
        <div class="sidebar">
            <input type="search" id="search" placeholder="Search contacts..." />
            <ul id="contact-list">
                Loading contacts...
                <noscript>This app uses JavaScript. Send a PR if that's a problem.</noscript>
            </ul>
        </div>
        <div class="details-view">
            <button class="back-button" onclick="mobileDetailsView(true)"><i class="fa fa-arrow-left"> </i> Back</button>
            <div id="contact-details">
                <p>Select a contact to view details</p>
                <hr/>
                <button><i class="fa fa-user"></i> Edit my profile</button>&nbsp;
                <button><i class="fa fa-plus"></i> Make a new contact</button>
            </div>
        </div>
        <input type="file" id="contact-upload" accept="text/vcard" hidden />
    </div>
    <script src="{{fediy_contacts_base_uri}}/main.js"></script>
</body>
</html>
