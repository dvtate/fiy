<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contacts Page</title>

    <link rel="stylesheet" href="main.css" />

    <!-- TODO locally host this instead -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>
<body>
    <nav class="navbar">
        <a class="nav-icon" href="/portal" title="Apps"><i class="fa fa-th"></i></a>
        <a class="nav-icon" title="Add Contact"><i class="fa fa-plus"></i></a>
        <a class="nav-icon" title="Profile"><i class="fa fa-user"></i></a>
        <a class="nav-icon" title="Notifications"><i class="fa fa-bell"></i></a>
        <a class="nav-icon" title="Settings"><i class="fa fa-cog"></i></a>
    </nav>
    <div class="container">
        <div class="sidebar">
            <input type="search" id="search" placeholder="Search contacts..." />
            <ul id="contact-list">
                Loading contacts...
                <noscript>This app uses JavaScript. Send a PR if that's a problem.</noscript>
            </ul>
        </div>
        <div class="details-view">
            <button class="back-button" onclick="mobileDetailsView(true)"><i class="fa fa-arrow-left"> </i> Back</button>
            <div id="contact-details">
                <p>Select a contact to view details</p>
                <hr/>
                <button><i class="fa fa-user"></i> Edit my profile</button>&nbsp;
                <button><i class="fa fa-plus"></i> Make a new contact</button>
            </div>
        </div>
    </div>
    <script src="main.bundle.js"></script>
</body>
</html>
