        function renderContacts(filter = "") {

                    li.textContent = contact.name;
                    li.title = contact.user;
                    li.onclick = () => showContactDetails(index);
                    contactList.appendChild(li);
                });

        function mobileDetailsView(goBack = false) {
            if (window.innerWidth > 768)

        function showContactDetails(index) {
            function fieldToString([name, value]) {
                let ret = `<p><strong>${name}:</strong> `;
                if (name.endsWith('Email')) {
                    ret += `<a href="mailto:${value}">${value}</a>`;
                } else if (name.endsWith('Phone')) {
                    ret += `<a href="tel:${value}">${value}</a>`;
                } else if (name.endsWith('Website')) {
                    ret += `<a href="${value}" target="_blank">${value}</a>`;
                } else {
                    ret += value;
                }
                ret += '</p>';
                return ret;
            }
