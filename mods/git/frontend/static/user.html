<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

<nav>
    <a href="//{{fiy_domain}}/portal">Portal</a>
    | <a href="{{mod_baseurl}}">Git-IY</a>
    | <a href="{{mod_baseurl}}/{{request_user}}">Profile</a>
    <hr/>
</nav>

<div class="container">
    <noscript>
        <h1>This page requires JavaScript. :(</h1>
    </noscript>
    <div class="profile-tabs">
        <a href="?tab=repos">Repositories</a>
        | <a href="?tab=activity">Activity</a>
        | <a href="?tab=likes">Likes</a>
    </div>

    <!-- this should get ssr'd -->
    <div id="user-basic-info">
        <img id="user-pfp" src="//{{fiy_domain}}/mods/contacts/pfp/{{fiy_user}}"  alt="profile image" />
        <h2 id="user-dn">{{fiy_display_name}}</h2>
        <h4 id="user-fiy">{{fiy_user}}</h4>
        <p id="user-bio">{{fiy_user_bio}}</p>
        <!-- no followers/following for now -->
        <!-- todo get more info from contacts mod -->
    </div>

    <div id="tab-view">
    </div>
</div>
    <script>
        const domain = "{{fiy_domain}}";
        const baseUrl = "{{mod_baseurl}}";
        let user;

        const tabView = document.getElementById('tab-view');

        async function getUserInfo() {
            // TODO fetch this on the backend instead
            const url = "//{{fiy_domain}}/mods/contacts/profile/" + user;
            const r = await fetch(url, {
                headers: {
                    "Accept": "application/json",
                },
            });
            const data = await r.json();
            document.getElementById("user-pfp").src = "//{{fiy_domain}}/mods/contacts/pfp/" + user;
            document.getElementById("user-dn").innerText = data.name;
            document.getElementById("user-fiy").innerText = user;
            document.getElementById("user-bio").innerText = data.bio;
            const links = [];
            if (data.websites instanceof Array)
                links.push(...data.websites);
            if (data.socials instanceof Array)
                links.push(...data.socials);
            const sec = document.getElementById("user-basic-info");
            sec.insertAdjacentHTML('beforeend', links.map(s =>
                `&#x1F517;<a href="${s}" target="_blank" rel="nofollow me">${s}</a><br/>`
                ).join(''));
        }

        function repoCard(repo) {
            let displayPath = repo.path;
            const [owner, repoName] = displayPath.split('/');
            if (user === owner || user === owner + '@' + domain)
                displayPath = repoName;
            return `<div class="repo-card">
                    <span class="repo-card-path">
                        <a href="${baseUrl}/${repo.path}">${displayPath}</a>
                    </span>
                    <p class="repo-card-description">${repo.description || ""}</p>
                </div>`;
        }

        const View = {
            async repos() {
                const r = await fetch(baseUrl + '/api/repo/search?owner=' + user);
                const repos = await r.json();
                tabView.innerHTML = '<h3>Repositories</h3>'
                    + repos.map(path => repoCard({ path })).join('');
            },
            async likes() {
                const rs = await Promise.all([
                    fetch(baseUrl + '/api/user/' + user + '/likes_count'),
                    fetch(baseUrl + '/api/user/' + user + '/likes')
                ]);
                const vs = await Promise.all(rs.map(r => r.json()));
            },
        };

        function renderPage() {
            // Get username in canonical form
            let url = new URL(document.location.toString());
            user = url.pathname.split('/').filter(e => !!e).pop();
            let [ userName, userHost ] = user.split('@').filter(e => !!e);
            if (!userHost)
                userHost = domain;
            user = userName + '@' + userHost; // Canonical

            getUserInfo();
            let tab = url.searchParams.get("tab");
            if (!View[tab])
                tab = 'repos';
            View[tab]();
        }
        renderPage();

    </script>
</body>
</html>
